# EMS schema-v2 direct runtime configuration.
#
# Ownership rule:
# - This file owns only static topology, physical direction capabilities,
#   role constraints, and policy-engine cadence.
# - sensor.ems_policy_config_runtime owns slow-changing runtime policy config.
                                                 
# - sensor.ems_measurements_runtime owns fast measurements and adapter state.
# - sensor.ems_policy_state_runtime owns state-machine / HAEO state.
# - Packet fields are strict: missing required data fails closed.
                                                   

ems:
  runtime_sources:
    policy_config:
      entity_id: sensor.ems_policy_config_runtime
    measurements:
      entity_id: sensor.ems_measurements_runtime
    policy_state:
      entity_id: sensor.ems_policy_state_runtime

  policy_engine:
    interval_seconds: 5
    diagnostics_interval_seconds: 30



  role_constraints:
    default:
      primary: HOME_BATTERY
      adjustable: EV_CHARGER

  devices:
    HOME_BATTERY:
      kind: BATTERY
      capabilities:
        can_absorb_w: true
        can_produce_w: true
        supports_primary_regulation: true
        supports_residual_regulation: true

    EV_CHARGER:
      kind: EV_CHARGER
      capabilities:
        can_absorb_w: true
        can_produce_w: false
        supports_primary_regulation: true
        supports_residual_regulation: false

    RELAY1:
      kind: RELAY
      capabilities:
        can_absorb_w: true
        can_produce_w: false
        supports_primary_regulation: false
        supports_residual_regulation: false

    RELAY2:
      kind: RELAY
      capabilities:
        can_absorb_w: true
        can_produce_w: false
        supports_primary_regulation: false
        supports_residual_regulation: false
