ems:
  profiles:
    control: input_select.ems_control_profile
    goal: input_select.ems_goal_profile
    forecast: input_select.ems_forecast_profile
    guard: input_select.ems_guard_profile
  policy_engine:
    interval_seconds: 5
  global_config:
    deadband_w: input_number.ems_deadband_w
    ramp_w: input_number.ems_ramp_max_w
    strict_limit_w: input_number.ems_strict_limits_max_w
    surplus_freeze_s: input_number.ems_surplus_freeze_s
    haeo_stale_timeout_s: input_number.ems_haeo_stale_timeout_s
    nz_battery_floor_default_w: input_number.ems_nz_battery_floor_default_w
    nz_battery_floor_ev_active_w: input_number.ems_nz_battery_floor_ev_active_w
    primary_device_id: input_select.ems_adjustable_primary_load
  role_constraints:
    EV_PRIMARY:
      HOME_BATTERY:
        min_absorb_w: input_number.ems_home_battery_ev_primary_min_absorb_w
  devices:
    HOME_BATTERY:
      kind: BATTERY
      capabilities:
        can_absorb_w: true
        can_produce_w: true
        uses_hard_off_lifecycle: false
        supports_primary_regulation: true
        supports_residual_regulation: true
        min_absorb_w: input_number.ems_home_battery_min_absorb_w
        max_absorb_w: input_number.ems_max_battery_charge_w
        max_produce_w: input_number.ems_max_battery_discharge_w
        step_w: input_number.ems_deadband_w
      policy:
        priority: input_number.ems_adjustable_surplus_load_priority
        default_min_absorb_w: input_number.ems_home_battery_default_min_absorb_w
        surplus_allowed: false
        surplus_dispatch_mode: max_absorb
      guard:
        soc: sensor.victron_mqtt_b827eb48c929_system_0_system_dc_battery_soc
        min_cell_voltage_v: sensor.victron_mqtt_b827eb48c929_battery_1_battery_min_cell_voltage
        heartbeat: sensor.victron_mqtt_b827eb48c929_battery_1_battery_power
        protect_soc: input_number.ems_battery_protect_soc
        protect_soc_recovery_margin: input_number.ems_battery_protect_soc_recovery_margin
        protect_min_cell_voltage_v: input_number.ems_battery_protect_min_cell_voltage_v
        protect_min_absorb_w: input_number.ems_battery_protect_charge_floor_w
      adapter:
        target_w: number.victron_mqtt_b827eb48c929_system_0_system_ac_power_set_point
        measured_power_w: sensor.victron_mqtt_b827eb48c929_battery_1_battery_power
    EV_MAIN:
      kind: EV_CHARGER
      capabilities:
        can_absorb_w: true
        can_produce_w: false
        uses_hard_off_lifecycle: true
        supports_primary_regulation: true
        supports_residual_regulation: false
        min_absorb_w: input_number.ems_ev_main_min_power_w
        max_absorb_w: input_number.ems_ev_main_max_power_w
        step_w: input_number.ems_ev_main_power_step_w
      policy:
        priority: input_number.ems_surplus_ev_main_priority
        surplus_allowed: false
        force_on: input_boolean.ems_ev_main_force_on
        low_pv_threshold_w: input_number.ems_ev_main_low_pv_threshold_w
        hard_off_low_pv_cycles: input_number.ems_ev_main_low_pv_cycles
        hard_off_release_cycles: input_number.ems_ev_main_release_cycles
        surplus_dispatch_mode: max_absorb
      adapter:
        enabled: switch.ev_main_enabled
        current_a: number.ev_main_current_a
        current_step_a: input_number.ems_ev_main_current_step_a
        phases: input_number.ems_ev_main_phases
        voltage_v: input_number.ems_ev_main_voltage_v
    EV_GARAGE:
      kind: EV_CHARGER
      capabilities:
        can_absorb_w: true
        can_produce_w: false
        uses_hard_off_lifecycle: true
        supports_primary_regulation: true
        supports_residual_regulation: false
        min_absorb_w: input_number.ems_ev_garage_min_power_w
        max_absorb_w: input_number.ems_ev_garage_max_power_w
        step_w: input_number.ems_ev_garage_power_step_w
      policy:
        priority: input_number.ems_surplus_ev_garage_priority
        surplus_allowed: true
        force_on: input_boolean.ems_ev_garage_force_on
        low_pv_threshold_w: input_number.ems_ev_garage_low_pv_threshold_w
        hard_off_low_pv_cycles: input_number.ems_ev_garage_low_pv_cycles
        hard_off_release_cycles: input_number.ems_ev_garage_release_cycles
        surplus_dispatch_mode: max_absorb
      adapter:
        enabled: switch.ev_garage_enabled
        current_a: number.ev_garage_current_a
        current_step_a: input_number.ems_ev_garage_current_step_a
        phases: input_number.ems_ev_garage_phases
        voltage_v: input_number.ems_ev_garage_voltage_v
    RELAY_SAUNA:
      kind: RELAY
      capabilities:
        can_absorb_w: true
        can_produce_w: false
        uses_hard_off_lifecycle: false
        supports_primary_regulation: false
        supports_residual_regulation: false
        min_absorb_w: input_number.ems_relay_sauna_nominal_absorb_w
        max_absorb_w: input_number.ems_relay_sauna_power_kw
        step_w: input_number.ems_relay_sauna_power_kw
      policy:
        priority: input_number.ems_surplus_relay_sauna_priority
        surplus_allowed: input_boolean.ems_relay_sauna_enabled_import_zero
        force_on: input_boolean.ems_relay_sauna_force_on
        surplus_dispatch_mode: fixed
      adapter:
        enabled: switch.relay_sauna_enabled
    RELAY_BOILER:
      kind: RELAY
      capabilities:
        can_absorb_w: true
        can_produce_w: false
        uses_hard_off_lifecycle: false
        supports_primary_regulation: false
        supports_residual_regulation: false
        min_absorb_w: input_number.ems_relay_boiler_nominal_absorb_w
        max_absorb_w: input_number.ems_relay_boiler_power_kw
        step_w: input_number.ems_relay_boiler_power_kw
      policy:
        priority: input_number.ems_surplus_relay_boiler_priority
        surplus_allowed: input_boolean.ems_relay_boiler_enabled_import_zero
        force_on: input_boolean.ems_relay_boiler_force_on
        surplus_dispatch_mode: fixed
      adapter:
        enabled: switch.relay_boiler_enabled
  runtime:
    grid_power_w: sensor.average_active_power_2
    quarter_energy_balance_kwh: sensor.hourly_energy_balance
    pv_power_w: sensor.pv_instant_power_2
  haeo:
    battery_power_active: sensor.haeo_battery_power_active
    ev_power_active: sensor.haeo_ev_battery_power_active
    battery_fresh_source: sensor.battery_active_power
    ev_fresh_source: sensor.ev_akut_active_power
  state:
    surplus_freeze_until: input_datetime.ems_surplus_freeze_until
    active_surplus_devices: sensor.ems_active_surplus_devices
