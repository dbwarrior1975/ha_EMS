# Scenario-specific grouped config for 1 EV + 3 relay E2E coverage.

ems:
  profiles:
    control: input_select.ems_control_profile
    goal: input_select.ems_goal_profile
    forecast: input_select.ems_forecast_profile
    guard: input_select.ems_guard_profile

  policy_engine:
    interval_seconds: 5

  global_config:
    deadband_w: input_number.ems_deadband_w
    ramp_w: input_number.ems_ramp_max_w
    strict_limit_w: input_number.ems_strict_limits_max_w
    surplus_freeze_s: input_number.ems_surplus_freeze_s
    haeo_stale_timeout_s: input_number.ems_haeo_stale_timeout_s
    nz_battery_floor_default_w: input_number.ems_nz_battery_floor_default_w
    nz_battery_floor_ev_active_w: input_number.ems_nz_battery_floor_ev_active_w
    adjustable_surplus_load: input_select.ems_adjustable_surplus_load
    adjustable_primary_load: input_select.ems_adjustable_primary_load
    adjustable_surplus_activation_w: input_number.ems_adjustable_surplus_activation_w

  role_constraints:
    default:
      activation_threshold_w: input_number.ems_default_activation_threshold_w
    EV_PRIMARY:
      HOME_BATTERY:
        min_absorb_w: input_number.ems_home_battery_ev_primary_min_absorb_w
    HOME_BATTERY_PRIMARY:
      EV_CHARGER:
        activation_threshold_w: input_number.ems_ev_adjustable_activation_threshold_w

  devices:
    HOME_BATTERY:
      kind: BATTERY
      capabilities:
        can_absorb_w: true
        can_produce_w: true
        min_absorb_w: input_number.ems_home_battery_min_absorb_w
        max_absorb_w: input_number.ems_max_battery_charge_w
        max_produce_w: input_number.ems_max_battery_discharge_w
        step_w: input_number.ems_deadband_w
      policy:
        priority: input_number.ems_adjustable_surplus_load_priority
        default_min_absorb_w: input_number.ems_home_battery_default_min_absorb_w
      guard:
        soc: sensor.victron_mqtt_b827eb48c929_system_0_system_dc_battery_soc
        min_cell_voltage_v: sensor.victron_mqtt_b827eb48c929_battery_1_battery_min_cell_voltage
        heartbeat: sensor.victron_mqtt_b827eb48c929_battery_1_battery_power
        protect_soc: input_number.ems_battery_protect_soc
        protect_soc_recovery_margin: input_number.ems_battery_protect_soc_recovery_margin
        protect_min_cell_voltage_v: input_number.ems_battery_protect_min_cell_voltage_v
        protect_min_absorb_w: input_number.ems_battery_protect_charge_floor_w
      adapter:
        target_w: number.victron_mqtt_b827eb48c929_system_0_system_ac_power_set_point
        measured_power_w: sensor.victron_mqtt_b827eb48c929_battery_1_battery_power

    EV_CHARGER:
      kind: EV_CHARGER
      capabilities:
        can_absorb_w: true
        can_produce_w: false
        min_absorb_w: input_number.ems_ev_min_power_w
        max_absorb_w: input_number.ems_ev_max_power_w
        step_w: input_number.ems_ev_power_step_w
      policy:
        priority: input_number.ems_surplus_ev_priority
        surplus_allowed: input_boolean.ems_ev_surplus_allowed
        force_on: input_boolean.ems_ev_force_on
        low_pv_threshold_w: input_number.ems_ev_hard_off_pv_threshold_kw
        hard_off_low_pv_cycles: input_number.ems_ev_hard_off_low_pv_cycles
        hard_off_release_cycles: input_number.ems_ev_hard_off_release_cycles
      adapter:
        enabled: switch.charger_control
        current_a: number.charger_current_level
        current_step_a: input_number.ems_ev_current_step_a
        phases: input_number.ems_ev_charger_phases
        voltage_v: input_number.ems_ev_voltage_v

    RELAY1:
      kind: RELAY
      capabilities:
        can_absorb_w: true
        can_produce_w: false
        min_absorb_w: input_number.ems_relay1_nominal_absorb_w
        max_absorb_w: input_number.ems_relay1_power_kw
        step_w: input_number.ems_relay1_power_kw
      policy:
        priority: input_number.ems_surplus_relay1_priority
        surplus_allowed: input_boolean.ems_relay1_enabled_import_zero
        force_on: input_boolean.ems_relay1_force_on
      adapter:
        enabled: switch.relay_1_2

    RELAY2:
      kind: RELAY
      capabilities:
        can_absorb_w: true
        can_produce_w: false
        min_absorb_w: input_number.ems_relay2_nominal_absorb_w
        max_absorb_w: input_number.ems_relay2_power_kw
        step_w: input_number.ems_relay2_power_kw
      policy:
        priority: input_number.ems_surplus_relay2_priority
        surplus_allowed: input_boolean.ems_relay2_enabled_import_zero
        force_on: input_boolean.ems_relay2_force_on
      adapter:
        enabled: switch.relay_2_2

    RELAY3:
      kind: RELAY
      capabilities:
        can_absorb_w: true
        can_produce_w: false
        min_absorb_w: input_number.ems_relay3_nominal_absorb_w
        max_absorb_w: input_number.ems_relay3_power_kw
        step_w: input_number.ems_relay3_power_kw
      policy:
        priority: input_number.ems_surplus_relay3_priority
        surplus_allowed: input_boolean.ems_relay3_enabled_import_zero
        force_on: input_boolean.ems_relay3_force_on
      adapter:
        enabled: switch.relay_3_2

  runtime:
    grid_power_w: sensor.average_active_power_2
    quarter_energy_balance_kwh: sensor.hourly_energy_balance
    pv_power_w: sensor.pv_instant_power_2

  haeo:
    battery_power_active: sensor.haeo_battery_power_active
    ev_power_active: sensor.haeo_ev_battery_power_active
    battery_fresh_source: sensor.battery_active_power
    ev_fresh_source: sensor.ev_akut_active_power

  state:
    surplus_freeze_until: input_datetime.ems_surplus_freeze_until
    active_surplus_devices: sensor.ems_active_surplus_devices
    previous_device_state: sensor.ems_previous_device_state

  policy_outputs:
    device_policies: sensor.ems_device_policies_pyscript
    dispatch_command: sensor.ems_surplus_dispatch_command_pyscript
    policy_state: sensor.ems_policy_state_pyscript

  diagnostics_outputs:
    policy_diagnostics: sensor.ems_policy_diagnostics_pyscript
    actuator_writer_trace: sensor.ems_actuator_writer_trace
    dispatch_state_applier_trace: sensor.ems_dispatch_state_applier_trace
