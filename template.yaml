            {{ (hourly_energy_import | float - hourly_energy_export | float) | round(4) }}
          {% else %}
            0
          {% endif %}

# Vartti-deltat pulssina: lasketaan vartin lopussa ja nollataan vartin vaihdon jälkeen
  - trigger:
      # LASKENTA vartin lopussa
      - platform: time_pattern
        hours: "*"
        minutes: "14"
        seconds: "58"
      - platform: time_pattern
        hours: "*"
        minutes: "29"
        seconds: "58"
      - platform: time_pattern
        hours: "*"
        minutes: "44"
        seconds: "58"
      - platform: time_pattern
        hours: "*"
        minutes: "59"
        seconds: "58"

      # NOLLAUS vartin vaihdon jälkeen (pulssin purku)
      - platform: time_pattern
        hours: "*"
        minutes: "00"
        seconds: "02"
      - platform: time_pattern
        hours: "*"
        minutes: "15"
        seconds: "02"
      - platform: time_pattern
        hours: "*"
        minutes: "30"
        seconds: "02"
      - platform: time_pattern
        hours: "*"
        minutes: "45"
        seconds: "02"

    sensor:
      # helper: onko kyseessä nollausajo
      - name: "template_quarter_pulse_reset_flag"
        state: |-
          {% set m = trigger.now.minute %}
          {% set s = trigger.now.second %}
          {{ 1 if (m in [0,15,30,45] and s == 2) else 0 }}
        # ei device_class tms, tätä ei käytetä utilityyn

      # PV -> Akku DELTA (kWh / vartti)  (pulssi)
      - name: "import_to_battery_from_pv_delta"
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: measurement
        state: |-
          {% set is_reset = (trigger.now.minute in [0,15,30,45] and trigger.now.second == 2) %}
          {% if is_reset %}
            0
          {% else %}
            {% set pv       = states('sensor.hourly_solaxyield')|float(0) %}
            {% set grid_imp = states('sensor.hourly_energy_import')|float(0) %}
            {% set batt_dis = states('sensor.hourly_battery_export')|float(0) %}
            {% set grid_exp = states('sensor.hourly_energy_export')|float(0) %}
            {% set batt_chg = states('sensor.hourly_battery_import')|float(0) %}

            {% set load = pv + grid_imp + batt_dis - grid_exp - batt_chg %}
            {% if load < 0 %}{% set load = 0 %}{% endif %}

            {% set pv_to_load = [pv, load] | min %}
            {% if pv_to_load < 0 %}{% set pv_to_load = 0 %}{% endif %}

            {% set pv_surplus = pv - pv_to_load %}
            {% if pv_surplus < 0 %}{% set pv_surplus = 0 %}{% endif %}

            {% set pv_to_batt = [pv_surplus, batt_chg] | min %}
            {% if pv_to_batt < 0 %}{% set pv_to_batt = 0 %}{% endif %}

            {{ pv_to_batt | round(4) }}
          {% endif %}

      # Grid -> Akku DELTA (kWh / vartti)  (pulssi)
      - name: "import_to_battery_from_grid_delta"
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: measurement
        state: |-
          {% set is_reset = (trigger.now.minute in [0,15,30,45] and trigger.now.second == 2) %}
          {% if is_reset %}
            0
          {% else %}
            {% set pv       = states('sensor.hourly_solaxyield')|float(0) %}
            {% set grid_imp = states('sensor.hourly_energy_import')|float(0) %}
            {% set batt_dis = states('sensor.hourly_battery_export')|float(0) %}
            {% set grid_exp = states('sensor.hourly_energy_export')|float(0) %}
            {% set batt_chg = states('sensor.hourly_battery_import')|float(0) %}

            {% set load = pv + grid_imp + batt_dis - grid_exp - batt_chg %}
            {% if load < 0 %}{% set load = 0 %}{% endif %}

            {% set pv_to_load = [pv, load] | min %}
            {% if pv_to_load < 0 %}{% set pv_to_load = 0 %}{% endif %}

            {% set pv_surplus = pv - pv_to_load %}
            {% if pv_surplus < 0 %}{% set pv_surplus = 0 %}{% endif %}

            {% set pv_to_batt = [pv_surplus, batt_chg] | min %}
            {% if pv_to_batt < 0 %}{% set pv_to_batt = 0 %}{% endif %}

            {% set grid_to_batt = batt_chg - pv_to_batt %}
            {% if grid_to_batt < 0 %}{% set grid_to_batt = 0 %}{% endif %}

            {{ grid_to_batt | round(4) }}
          {% endif %}

      # Netto Ostot (kumulatiivinen) – EI saa kasvaa nollausajoilla
      - name: "Netto Ostot"
        state_class: total_increasing
        device_class: energy
        unit_of_measurement: "kWh"
        attributes:
          last_reset: '1970-01-01T00:00:00+00:00'
        state: |-
          {% set is_reset = (trigger.now.minute in [0,15,30,45] and trigger.now.second == 2) %}
          {% if is_reset %}
            {{ states('sensor.netto_ostot')|float(0) | round(2) }}
          {% else %}
            {% set balance = states('sensor.hourly_energy_balance')|float(0) %}
            {% set pv       = states('sensor.hourly_solaxyield')|float(0) %}
            {% set grid_imp = states('sensor.hourly_energy_import')|float(0) %}
            {% set batt_dis = states('sensor.hourly_battery_export')|float(0) %}
            {% set grid_exp = states('sensor.hourly_energy_export')|float(0) %}
            {% set batt_chg = states('sensor.hourly_battery_import')|float(0) %}

            {# laske grid->akku samaan tapaan kuin yllä #}
            {% set load = pv + grid_imp + batt_dis - grid_exp - batt_chg %}
            {% if load < 0 %}{% set load = 0 %}{% endif %}
            {% set pv_to_load = [pv, load] | min %}
            {% if pv_to_load < 0 %}{% set pv_to_load = 0 %}{% endif %}
            {% set pv_surplus = pv - pv_to_load %}
            {% if pv_surplus < 0 %}{% set pv_surplus = 0 %}{% endif %}
            {% set pv_to_batt = [pv_surplus, batt_chg] | min %}
            {% if pv_to_batt < 0 %}{% set pv_to_batt = 0 %}{% endif %}
            {% set grid_to_batt = batt_chg - pv_to_batt %}
            {% if grid_to_batt < 0 %}{% set grid_to_batt = 0 %}{% endif %}

            {% if balance > 0 %}
              {{ (states('sensor.netto_ostot')|float(0) + balance - grid_to_batt) | round(2) }}
            {% else %}
              {{ states('sensor.netto_ostot')|float(0) | round(2) }}
            {% endif %}
          {% endif %}

      # PV -> oma kulutus DELTA (kWh / vartti)  (pulssi)
      - name: "pv_to_load_delta"
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: measurement
        state: |-
          {% set is_reset = (trigger.now.minute in [0,15,30,45] and trigger.now.second == 2) %}
          {% if is_reset %}
            0
          {% else %}
            {% set pv       = states('sensor.hourly_solaxyield')|float(0) %}
            {% set grid_imp = states('sensor.hourly_energy_import')|float(0) %}
            {% set batt_dis = states('sensor.hourly_battery_export')|float(0) %}
            {% set grid_exp = states('sensor.hourly_energy_export')|float(0) %}
            {% set batt_chg = states('sensor.hourly_battery_import')|float(0) %}

            {% set load = pv + grid_imp + batt_dis - grid_exp - batt_chg %}
            {% if load < 0 %}{% set load = 0 %}{% endif %}

            {% set pv_to_load = [pv, load] | min %}
            {% if pv_to_load < 0 %}{% set pv_to_load = 0 %}{% endif %}
            {{ pv_to_load | round(4) }}
          {% endif %}

      # PV -> Grid DELTA (kWh / vartti)  (pulssi)
      - name: "pv_to_grid_delta"
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: measurement
        state: |-
          {% set is_reset = (trigger.now.minute in [0,15,30,45] and trigger.now.second == 2) %}
          {% if is_reset %}
            0
          {% else %}
            {% set pv       = states('sensor.hourly_solaxyield')|float(0) %}
            {% set grid_imp = states('sensor.hourly_energy_import')|float(0) %}
            {% set batt_dis = states('sensor.hourly_battery_export')|float(0) %}
            {% set grid_exp = states('sensor.hourly_energy_export')|float(0) %}
            {% set batt_chg = states('sensor.hourly_battery_import')|float(0) %}

            {% set load = pv + grid_imp + batt_dis - grid_exp - batt_chg %}
            {% if load < 0 %}{% set load = 0 %}{% endif %}

            {% set pv_to_load = [pv, load] | min %}
            {% if pv_to_load < 0 %}{% set pv_to_load = 0 %}{% endif %}

            {% set pv_surplus = pv - pv_to_load %}
            {% if pv_surplus < 0 %}{% set pv_surplus = 0 %}{% endif %}

            {% set pv_to_batt = [pv_surplus, batt_chg] | min %}
            {% if pv_to_batt < 0 %}{% set pv_to_batt = 0 %}{% endif %}

            {% set pv_to_grid = pv - pv_to_load - pv_to_batt %}
            {% if pv_to_grid < 0 %}{% set pv_to_grid = 0 %}{% endif %}
            {% if pv_to_grid > grid_exp %}{% set pv_to_grid = grid_exp %}{% endif %}

            {{ pv_to_grid | round(4) }}
          {% endif %}

      # PV-myynti DELTA (kWh / vartti)  (pulssi)
      - name: "pv_sales_delta"
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: measurement
        state: |-
          {% set is_reset = (trigger.now.minute in [0,15,30,45] and trigger.now.second == 2) %}
          {% if is_reset %}
            0
          {% else %}
            {% set balance = states('sensor.hourly_energy_balance')|float(0) %}
            {% if balance >= 0 %}
              0
            {% else %}
              {% set net_export = balance * -1 %}
              {# pv_to_grid lasketaan tässä itsenäisesti #}
              {% set pv       = states('sensor.hourly_solaxyield')|float(0) %}
              {% set grid_imp = states('sensor.hourly_energy_import')|float(0) %}
              {% set batt_dis = states('sensor.hourly_battery_export')|float(0) %}
              {% set grid_exp = states('sensor.hourly_energy_export')|float(0) %}
              {% set batt_chg = states('sensor.hourly_battery_import')|float(0) %}

              {% set load = pv + grid_imp + batt_dis - grid_exp - batt_chg %}
              {% if load < 0 %}{% set load = 0 %}{% endif %}

              {% set pv_to_load = [pv, load] | min %}
              {% if pv_to_load < 0 %}{% set pv_to_load = 0 %}{% endif %}
              {% set pv_surplus = pv - pv_to_load %}
              {% if pv_surplus < 0 %}{% set pv_surplus = 0 %}{% endif %}
              {% set pv_to_batt = [pv_surplus, batt_chg] | min %}
              {% if pv_to_batt < 0 %}{% set pv_to_batt = 0 %}{% endif %}
              {% set pv_to_grid = pv - pv_to_load - pv_to_batt %}
              {% if pv_to_grid < 0 %}{% set pv_to_grid = 0 %}{% endif %}
              {% if pv_to_grid > grid_exp %}{% set pv_to_grid = grid_exp %}{% endif %}

              {{ [pv_to_grid, net_export] | min | round(4) }}
            {% endif %}
          {% endif %}

      # Akku-myynti DELTA (kWh / vartti)  (pulssi)
      - name: "battery_sales_delta"
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: measurement
        state: |-
          {% set is_reset = (trigger.now.minute in [0,15,30,45] and trigger.now.second == 2) %}
          {% if is_reset %}
            0
          {% else %}
            {% set balance = states('sensor.hourly_energy_balance')|float(0) %}
            {% set batt_dis = states('sensor.hourly_battery_export')|float(0) %}
            {% if balance >= 0 %}
              0
            {% else %}
              {% set net_export = balance * -1 %}
              {% set pv_sale = states('sensor.pv_sales_delta')|float(0) %}
              {% set remaining = net_export - pv_sale %}
              {% if remaining < 0 %}{% set remaining = 0 %}{% endif %}
              {{ [batt_dis, remaining] | min | round(4) }}
            {% endif %}
          {% endif %}

      # Akusta omaan kulutukseen DELTA (kWh / vartti) – UUSI SEMANTIIKKA (pulssi)
      - name: "battery_to_self_delta"
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: measurement
        state: |-
          {% set is_reset = (trigger.now.minute in [0,15,30,45] and trigger.now.second == 2) %}
          {% if is_reset %}
            0
          {% else %}
            {% set batt_dis = states('sensor.hourly_battery_export')|float(0) %}
            {% set balance  = states('sensor.hourly_energy_balance')|float(0) %}
            {% if balance >= 0 %}
              {{ batt_dis | round(4) }}
            {% else %}
              {% set batt_sale = states('sensor.battery_sales_delta')|float(0) %}
              {% set self = batt_dis - batt_sale %}
              {% if self < 0 %}{% set self = 0 %}{% endif %}
              {{ self | round(4) }}
            {% endif %}
          {% endif %}

      # Akusta verkkoon DELTA (kWh / vartti) – vastaa akkumyyntiä (pulssi)
      - name: "battery_to_grid_delta"
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: measurement
        state: |-
          {% set is_reset = (trigger.now.minute in [0,15,30,45] and trigger.now.second == 2) %}
          {% if is_reset %}
            0
          {% else %}
            {% set balance = states('sensor.hourly_energy_balance')|float(0) %}
            {% if balance >= 0 %}
              0
            {% else %}
              {{ states('sensor.battery_sales_delta')|float(0) | round(4) }}
            {% endif %}
          {% endif %}




