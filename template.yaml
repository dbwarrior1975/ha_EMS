  # template.yaml (korvaa nykyisen binäärisensorin)
  - binary_sensor:
    - name: "SHF Cheaper 2×15min in next 2h"
      unique_id: shf_cheaper_next_two_quarters
      device_class: problem
      availability: |-
        {% set data = state_attr("sensor.shf_data","data") | default([], true) %}
        {% set base = now().replace(second=0, microsecond=0) - timedelta(minutes = (now().minute % 15)) %}
        {% set ts0 = base | as_timestamp %}
        {% set ts1 = ts0 + 900 %}
        {{ (data | selectattr("Timestamp","eq", ts0) | list | count) > 0
           and (data | selectattr("Timestamp","eq", ts1) | list | count) > 0 }}
      state: |-
        {% set data = state_attr("sensor.shf_data","data") | default([], true) %}
        {% set factor = state_attr("sensor.shf_data","price_factor") | float(1) %}
  
        {# Kynnys euroina suoraan input_numberista #}
        {% set h_eur = states('input_number.nibe_spot_hysteresis') | float(0) %}
        {% set threshold = h_eur * factor %}
  
        {# nykyinen 15 min raja #}
        {% set base = now().replace(second=0, microsecond=0) - timedelta(minutes = (now().minute % 15)) %}
        {% set ts0 = base | as_timestamp %}
        {% set ts1 = ts0 + 900 %}
  
        {% set p0 = (data | selectattr("Timestamp","eq", ts0) | list | first) %}
        {% set p1 = (data | selectattr("Timestamp","eq", ts1) | list | first) %}
  
        {% if p0 is mapping and p1 is mapping %}
          {% set ref_avg = ((p0["TotalPrice"] | float) + (p1["TotalPrice"] | float)) / 2 %}
          {% set ns = namespace(found=false) %}
          {% for k in range(1, 8) %}
            {% set t_a = ts0 + k * 900 %}
            {% set t_b = t_a + 900 %}
            {% set a = (data | selectattr("Timestamp","eq", t_a) | list | first) %}
            {% set b = (data | selectattr("Timestamp","eq", t_b) | list | first) %}
            {% if a is mapping and b is mapping %}
              {% set cand_avg = ((a["TotalPrice"] | float) + (b["TotalPrice"] | float)) / 2 %}
              {% if cand_avg <= ref_avg - threshold %}
                {% set ns.found = true %}
                {% break %}
              {% endif %}
            {% endif %}
          {% endfor %}
          {{ 'on' if ns.found else 'off' }}
        {% else %}
          {{ 'off' }}
        {% endif %}
      attributes:
        reference_window_avg: |-
          {% set data = state_attr("sensor.shf_data","data") | default([], true) %}
          {% set base = now().replace(second=0, microsecond=0) - timedelta(minutes = (now().minute % 15)) %}
          {% set ts0 = base | as_timestamp %}
          {% set ts1 = ts0 + 900 %}
          {% set p0 = (data | selectattr("Timestamp","eq", ts0) | list | first) %}
          {% set p1 = (data | selectattr("Timestamp","eq", ts1) | list | first) %}
          {% if p0 is mapping and p1 is mapping %}
            {{ (((p0["TotalPrice"] | float) + (p1["TotalPrice"] | float)) / 2) | round(4) }}
          {% else %} unknown {% endif %}
        threshold_delta: |-
          {% set factor = state_attr("sensor.shf_data","price_factor") | float(1) %}
          {% set h_eur = states('input_number.nibe_spot_hysteresis') | float(0) %}
          {{ (h_eur * factor) | round(4) }}
        best_start_ts: |-
          {% set data = state_attr("sensor.shf_data","data") | default([], true) %}
          {% set factor = state_attr("sensor.shf_data","price_factor") | float(1) %}
          {% set threshold = (states('input_number.nibe_spot_hysteresis') | float(0)) * factor %}
          {% set base = now().replace(second=0, microsecond=0) - timedelta(minutes = (now().minute % 15)) %}
          {% set ts0 = base | as_timestamp %}
          {% set ts1 = ts0 + 900 %}
          {% set p0 = (data | selectattr("Timestamp","eq", ts0) | list | first) %}
          {% set p1 = (data | selectattr("Timestamp","eq", ts1) | list | first) %}
          {% if p0 is mapping and p1 is mapping %}
            {% set ref_avg = ((p0["TotalPrice"] | float) + (p1["TotalPrice"] | float)) / 2 %}
            {% set best = namespace(ts=none, diff=0) %}
            {% for k in range(1, 8) %}
              {% set t_a = ts0 + k * 900 %}
              {% set t_b = t_a + 900 %}
              {% set a = (data | selectattr("Timestamp","eq", t_a) | list | first) %}
              {% set b = (data | selectattr("Timestamp","eq", t_b) | list | first) %}
              {% if a is mapping and b is mapping %}
                {% set cand_avg = ((a["TotalPrice"] | float) + (b["TotalPrice"] | float)) / 2 %}
                {% set diff = (ref_avg - cand_avg) %}
                {% if diff > best.diff %}
                  {% set best.ts = t_a %}
                  {% set best.diff = diff %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {{ best.ts }}
          {% else %} unknown {% endif %}
        best_saving: |-
          {% set data = state_attr("sensor.shf_data","data") | default([], true) %}
          {% set base = now().replace(second=0, microsecond=0) - timedelta(minutes = (now().minute % 15)) %}
          {% set ts0 = base | as_timestamp %}
          {% set ts1 = ts0 + 900 %}
          {% set p0 = (data | selectattr("Timestamp","eq", ts0) | list | first) %}
          {% set p1 = (data | selectattr("Timestamp","eq", ts1) | list | first) %}
          {% if p0 is mapping and p1 is mapping %}
            {% set ref_avg = ((p0["TotalPrice"] | float) + (p1["TotalPrice"] | float)) / 2 %}
            {% set best = namespace(diff=0) %}
            {% for k in range(1, 8) %}
              {% set t_a = ts0 + k * 900 %}
              {% set t_b = t_a + 900 %}
              {% set a = (data | selectattr("Timestamp","eq", t_a) | list | first) %}
              {% set b = (data | selectattr("Timestamp","eq", t_b) | list | first) %}
              {% if a is mapping and b is mapping %}
                {% set cand_avg = ((a["TotalPrice"] | float) + (b["TotalPrice"] | float)) / 2 %}
                {% set diff = (ref_avg - cand_avg) %}
                {% if diff > best.diff %}
                  {% set best.diff = diff %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {{ best.diff | round(4) }}
          {% else %} unknown {% endif %}

  - trigger:
      # Päivitys aina kun lähdesensori muuttuu
      - platform: state
        entity_id: sensor.shf_electricity_price_now
      # Varmistus: päivitys myös säännöllisesti (jos lähde ei triggaa)
      - platform: time_pattern
        minutes: "/15"

    sensor:
      - name: "SHF Electricity Price Forecast (HAEO)"
        unique_id: shf_electricity_price_forecast_haeo
        unit_of_measurement: "€/kWh"
        device_class: monetary
        state_class: measurement

        # Nykyhinta: käytä ensisijaisesti sensorin statea
        state: |-
          {{ states('sensor.shf_electricity_price_now') | float(0) }}

        attributes:
          # HAEO-yhteensopiva ennuste: [{timestamp, value}, ...]
          forecast: >
            {% set rows = state_attr('sensor.shf_electricity_price_now', 'data') %}
            {% if not rows %}
              {{ [] }}
            {% else %}
              {% set now_ts = as_timestamp(now()) %}
              {% set out = namespace(items=[]) %}

              {# Järjestä aikajärjestykseen ja suodata "nyt tai tulevaisuus" #}
              {% for r in rows | sort(attribute='DateTime') %}
                {% set dt = r['DateTime'] %}
                {% set ts = as_timestamp(dt) %}
                {% if ts >= now_ts %}
                  {% set out.items = out.items + [
                    {
                      'timestamp': dt,
                      'value': (r['TotalPrice'] | float)
                    }
                  ] %}
                {% endif %}
              {% endfor %}

              {{ out.items }}
            {% endif %}

