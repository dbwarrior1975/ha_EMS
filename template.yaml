
  - sensor:
      # ============================================================
      # EMS POLICY CONFIG RUNTIME
      # Slow-changing runtime policy configuration.
      # revision changes when any referenced runtime helper changes.
      # ============================================================
      - name: EMS Policy Config Runtime
        default_entity_id: sensor.ems_policy_config_runtime
        unique_id: ems_policy_config_runtime
  
        state: "{{ states('input_select.ems_control_profile') }}"
  
        attributes:
          schema_version: "{{ 2 }}"
  
          revision: >-
            {%- set revision_sources = [
              states.input_select.ems_control_profile,
              states.input_select.ems_goal_profile,
              states.input_select.ems_forecast_profile,
              states.input_select.ems_guard_profile,
  
              states.input_number.ems_deadband_w,
              states.input_number.ems_ramp_max_w,
              states.input_number.ems_strict_limits_max_w,
              states.input_number.ems_surplus_freeze_s,
              states.input_number.ems_haeo_stale_timeout_s,
              states.input_number.ems_nz_battery_floor_default_w,
              states.input_number.ems_nz_battery_floor_ev_active_w,
  
              states.input_select.ems_adjustable_primary_load,
  
              states.input_number.ems_max_battery_charge_w,
              states.input_number.ems_max_battery_discharge_w,
              states.input_number.ems_adjustable_surplus_load_priority,
              states.input_number.ems_battery_protect_soc,
              states.input_number.ems_battery_protect_soc_recovery_margin,
              states.input_number.ems_battery_protect_min_cell_voltage_v,
              states.input_number.ems_battery_protect_charge_floor_w,
  
              states.input_number.ems_ev_min_power_w,
              states.input_number.ems_ev_max_power_w,
              states.input_number.ems_surplus_ev_priority,
              states.input_boolean.ems_ev_force_on,
              states.input_number.ems_ev_hard_off_pv_threshold_kw,
              states.input_number.ems_ev_hard_off_low_pv_cycles,
              states.input_number.ems_ev_hard_off_release_cycles,
              states.input_number.ems_ev_current_step_a,
              states.input_number.ems_ev_charger_phases,
              states.input_number.ems_ev_voltage_v,
  
              states.input_number.ems_surplus_relay1_priority,
              states.input_boolean.ems_relay1_enabled_import_zero,
              states.input_boolean.ems_relay1_force_on,
  
              states.input_number.ems_surplus_relay2_priority,
              states.input_boolean.ems_relay2_enabled_import_zero,
              states.input_boolean.ems_relay2_force_on
            ] -%}
  
            {%- set ns = namespace(latest=0.0) -%}
  
            {%- for source in revision_sources -%}
              {%- if source is not none -%}
                {%- set updated = as_timestamp(source.last_updated, 0) -%}
                {%- if updated > ns.latest -%}
                  {%- set ns.latest = updated -%}
                {%- endif -%}
              {%- endif -%}
            {%- endfor -%}
  
            {{ ((ns.latest * 1000000) | int) + 2 }}
  
          profiles: >-
            {{
              {
                'control': states('input_select.ems_control_profile'),
                'goal': states('input_select.ems_goal_profile'),
                'forecast': states('input_select.ems_forecast_profile'),
                'guard': states('input_select.ems_guard_profile')
              }
            }}
  
          config: >-
            {{
              {
                'deadband_w':
                  states('input_number.ems_deadband_w'),
  
                'ramp_w':
                  states('input_number.ems_ramp_max_w'),
  
                'strict_limit_w':
                  states('input_number.ems_strict_limits_max_w'),
  
                'default_sp_w':
                  100,
  
                'surplus_freeze_s':
                  states('input_number.ems_surplus_freeze_s'),
  
                'battery_heartbeat_timeout_s':
                  360,
  
                'haeo_stale_timeout_s':
                  states('input_number.ems_haeo_stale_timeout_s'),
  
                'nz_battery_floor_default_w':
                  states('input_number.ems_nz_battery_floor_default_w'),
  
                'nz_battery_floor_ev_active_w':
                  states('input_number.ems_nz_battery_floor_ev_active_w'),
  
                'adjustable_primary_load':
                  states('input_select.ems_adjustable_primary_load'),
  
              }
            }}
  
          devices: >-
            {%- set discharge_raw =
              states('input_number.ems_max_battery_discharge_w')
            -%}
  
            {%- set ev_low_pv_raw =
              states('input_number.ems_ev_hard_off_pv_threshold_kw')
            -%}
  
            {%- set ev_current_step_raw =
              states('input_number.ems_ev_current_step_a')
            -%}
  
            {%- set ev_phases_raw =
              states('input_number.ems_ev_charger_phases')
            -%}
  
            {%- set ev_voltage_raw =
              states('input_number.ems_ev_voltage_v')
            -%}
  
            {%- set ev_step_w = (
              (ev_current_step_raw | float)
              * (ev_phases_raw | float)
              * (ev_voltage_raw | float)
            ) if (
              has_value('input_number.ems_ev_current_step_a')
              and has_value('input_number.ems_ev_charger_phases')
              and has_value('input_number.ems_ev_voltage_v')
            ) else 'unknown'
            -%}
  
            {{
              {
                'HOME_BATTERY': {
                  'capabilities': {
                    'uses_hard_off_lifecycle': false,
                    'supports_primary_regulation': true,
                    'supports_residual_regulation': true,
                    'min_absorb_w': 0,
  
                    'max_absorb_w':
                      states('input_number.ems_max_battery_charge_w'),
  
                    'max_produce_w': (
                      -1 * ((discharge_raw | float) | abs)
                    ) if (
                      has_value(
                        'input_number.ems_max_battery_discharge_w'
                      )
                    ) else discharge_raw,
  
                    'step_w':
                      states('input_number.ems_deadband_w')
                  },
  
                  'policy': {
                    'priority':
                      states(
                        'input_number.ems_adjustable_surplus_load_priority'
                      ),

                    'surplus_allowed': true,

                    'surplus_dispatch_mode': 'max_absorb',
  
                    'default_min_absorb_w':
                      0
                  },
  
                  'guard': {
                    'protect_soc':
                      states(
                        'input_number.ems_battery_protect_soc'
                      ),
  
                    'protect_soc_recovery_margin':
                      states(
                        'input_number.ems_battery_protect_soc_recovery_margin'
                      ),
  
                    'protect_min_cell_voltage_v':
                      states(
                        'input_number.ems_battery_protect_min_cell_voltage_v'
                      ),
  
                    'protect_min_absorb_w':
                      states(
                        'input_number.ems_battery_protect_charge_floor_w'
                      )
                  }
                },
  
                'EV_CHARGER': {
                  'capabilities': {
                    'uses_hard_off_lifecycle': true,
                    'supports_primary_regulation': true,
                    'supports_residual_regulation': false,
                    'min_absorb_w':
                      states('input_number.ems_ev_min_power_w'),
                
                    'max_absorb_w':
                      states('input_number.ems_ev_max_power_w'),
                
                    'max_produce_w':
                      0,
                
                    'step_w':
                      ev_step_w
                  },
                
                  'policy': {
                    'priority':
                      states('input_number.ems_surplus_ev_priority'),
                
                    'surplus_allowed': true,

                    'surplus_dispatch_mode': 'max_absorb',
                
                    'force_on':
                      true
                      if is_state(
                        'input_boolean.ems_ev_force_on',
                        'on'
                      )
                      else false
                      if is_state(
                        'input_boolean.ems_ev_force_on',
                        'off'
                      )
                      else states(
                        'input_boolean.ems_ev_force_on'
                      ),
                
                    'low_pv_threshold_w': (
                      (ev_low_pv_raw | float) * 1000
                    ) if (
                      has_value(
                        'input_number.ems_ev_hard_off_pv_threshold_kw'
                      )
                      and ((ev_low_pv_raw | float) | abs) <= 50
                    ) else ev_low_pv_raw,
                
                    'hard_off_low_pv_cycles':
                      states(
                        'input_number.ems_ev_hard_off_low_pv_cycles'
                      ),
                
                    'hard_off_release_cycles':
                      states(
                        'input_number.ems_ev_hard_off_release_cycles'
                      )
                  },
                
                  'adapter_config': {
                    'current_step_a':
                      states(
                        'input_number.ems_ev_current_step_a'
                      ),
                
                    'phases':
                      states(
                        'input_number.ems_ev_charger_phases'
                      ),
                
                    'voltage_v':
                      states(
                        'input_number.ems_ev_voltage_v'
                      )
                  }
                },
                  
                'RELAY1': {
                  'capabilities': {
                    'uses_hard_off_lifecycle': false,
                    'supports_primary_regulation': false,
                    'supports_residual_regulation': false,
                    'min_absorb_w': 2600,
                    'max_absorb_w': 2600,
                    'max_produce_w': 0,
                    'step_w': 2600
                  },
  
                  'policy': {
                    'priority':
                      states(
                        'input_number.ems_surplus_relay1_priority'
                      ),
  
                    'surplus_allowed':
                      true
                      if is_state(
                        'input_boolean.ems_relay1_enabled_import_zero',
                        'on'
                      )
                      else false
                      if is_state(
                        'input_boolean.ems_relay1_enabled_import_zero',
                        'off'
                      )
                      else states(
                        'input_boolean.ems_relay1_enabled_import_zero'
                      ),
                    'surplus_dispatch_mode': 'fixed',  

                    'force_on':
                      true
                      if is_state(
                        'input_boolean.ems_relay1_force_on',
                        'on'
                      )
                      else false
                      if is_state(
                        'input_boolean.ems_relay1_force_on',
                        'off'
                      )
                      else states(
                        'input_boolean.ems_relay1_force_on'
                      )
                  }
                },
  
                'RELAY2': {
                  'capabilities': {
                    'uses_hard_off_lifecycle': false,
                    'supports_primary_regulation': false,
                    'supports_residual_regulation': false,
                    'min_absorb_w': 5600,
                    'max_absorb_w': 5600,
                    'max_produce_w': 0,
                    'step_w': 5600
                  },
  
                  'policy': {
                    'priority':
                      states(
                        'input_number.ems_surplus_relay2_priority'
                      ),
  
                    'surplus_allowed':
                      true
                      if is_state(
                        'input_boolean.ems_relay2_enabled_import_zero',
                        'on'
                      )
                      else false
                      if is_state(
                        'input_boolean.ems_relay2_enabled_import_zero',
                        'off'
                      )
                      else states(
                        'input_boolean.ems_relay2_enabled_import_zero'
                      ),
  
                    'surplus_dispatch_mode': 'fixed',                                                     

                    'force_on':
                      true
                      if is_state(
                        'input_boolean.ems_relay2_force_on',
                        'on'
                      )
                      else false
                      if is_state(
                        'input_boolean.ems_relay2_force_on',
                        'off'
                      )
                      else states(
                        'input_boolean.ems_relay2_force_on'
                      )
                  }
                }
              }
            }}
  
  
      # ============================================================
      # EMS MEASUREMENTS RUNTIME
      # Fast-changing measurements.
      # ============================================================
      - name: EMS Measurements Runtime
        default_entity_id: sensor.ems_measurements_runtime
        unique_id: ems_measurements_runtime
  
        state: "{{ states('sensor.average_active_power_2') }}"
  
        attributes:
          schema_version: "{{ 2 }}"
  
          grid_power_w: >-
            {%- set raw =
              states('sensor.average_active_power_2')
            -%}
  
            {%- set unit =
              state_attr(
                'sensor.average_active_power_2',
                'unit_of_measurement'
              )
              | default('', true)
              | lower
            -%}
  
            {{
              (raw | float) * 1000
              if (
                has_value('sensor.average_active_power_2')
                and unit == 'kw'
              )
              else raw
            }}
  
          quarter_energy_balance_kwh: >-
            {{
              states('sensor.hourly_energy_balance')
            }}
  
          pv_power_w: >-
            {%- set raw =
              states('sensor.pv_instant_power_2')
            -%}
  
            {%- set unit =
              state_attr(
                'sensor.pv_instant_power_2',
                'unit_of_measurement'
              )
              | default('', true)
              | lower
            -%}
  
            {{
              (raw | float) * 1000
              if (
                has_value('sensor.pv_instant_power_2')
                and unit == 'kw'
              )
              else raw
            }}
  
          battery: >-
            {%- set heartbeat_entity =
              states.sensor.victron_mqtt_b827eb48c929_battery_1_battery_power
            -%}
  
            {%- set target_raw =
              states(
                'number.victron_mqtt_b827eb48c929_system_0_system_ac_power_set_point'
              )
            -%}
  
            {%- set target_unit =
              state_attr(
                'number.victron_mqtt_b827eb48c929_system_0_system_ac_power_set_point',
                'unit_of_measurement'
              )
              | default('', true)
              | lower
            -%}
  
            {%- set measured_raw =
              states(
                'sensor.victron_mqtt_b827eb48c929_battery_1_battery_power'
              )
            -%}
  
            {%- set measured_unit =
              state_attr(
                'sensor.victron_mqtt_b827eb48c929_battery_1_battery_power',
                'unit_of_measurement'
              )
              | default('', true)
              | lower
            -%}
  
            {{
              {
                'soc':
                  states(
                    'sensor.victron_mqtt_b827eb48c929_system_0_system_dc_battery_soc'
                  ),
  
                'min_cell_voltage_v':
                  states(
                    'sensor.victron_mqtt_b827eb48c929_battery_1_battery_min_cell_voltage'
                  ),
  
                'heartbeat':
                  states(
                    'sensor.victron_mqtt_b827eb48c929_battery_1_battery_power'
                  ),
  
                'heartbeat_age_s': (
                  as_timestamp(now())
                  - as_timestamp(
                      heartbeat_entity.last_updated,
                      0
                    )
                ) if (
                  heartbeat_entity is not none
                  and has_value(
                    'sensor.victron_mqtt_b827eb48c929_battery_1_battery_power'
                  )
                ) else 999999,
  
                'target_w': (
                  (target_raw | float) * 1000
                ) if (
                  has_value(
                    'number.victron_mqtt_b827eb48c929_system_0_system_ac_power_set_point'
                  )
                  and target_unit == 'kw'
                ) else target_raw,
  
                'measured_power_w': (
                  (measured_raw | float) * 1000
                ) if (
                  has_value(
                    'sensor.victron_mqtt_b827eb48c929_battery_1_battery_power'
                  )
                  and measured_unit == 'kw'
                ) else measured_raw
              }
            }}
  
          ev: >-
            {{
              {
                'EV_CHARGER': {
                  'enabled':
                    true
                    if is_state(
                      'switch.charger_control',
                      'on'
                    )
                    else false
                    if is_state(
                      'switch.charger_control',
                      'off'
                    )
                    else states(
                      'switch.charger_control'
                    ),
  
                  'current_a':
                    states(
                      'number.charger_current_level'
                    )
                }
              }
            }}
  
          relays: >-
            {{
              {
                'RELAY1': {
                  'enabled':
                    true
                    if is_state(
                      'switch.relay_1_2',
                      'on'
                    )
                    else false
                    if is_state(
                      'switch.relay_1_2',
                      'off'
                    )
                    else states(
                      'switch.relay_1_2'
                    )
                },

                'RELAY2': {
                  'enabled':
                    true
                    if is_state(
                      'switch.relay_2_2',
                      'on'
                    )
                    else false
                    if is_state(
                      'switch.relay_2_2',
                      'off'
                    )
                    else states(
                      'switch.relay_2_2'
                    )
                }
              }
            }}

  
      # ============================================================
      # EMS POLICY STATE RUNTIME
      # State-machine state + HAEO state.
      # ============================================================
      - name: EMS Policy State Runtime
        default_entity_id: sensor.ems_policy_state_runtime
        unique_id: ems_policy_state_runtime
  
        state: >-
          {{
            states('sensor.ems_policy_state_pyscript')
          }}
  
        attributes:
          schema_version: "{{ 2 }}"
  
          surplus: >-
            {{
              {
                'freeze_until':
                  as_timestamp(
                    states(
                      'input_datetime.ems_surplus_freeze_until'
                    ),
                    none
                  ),
  
                'active_device_ids':
                  state_attr(
                    'sensor.ems_active_surplus_devices',
                    'device_ids'
                  ) or [],
                'previous_device_states':
                  state_attr(
                    'sensor.ems_policy_state_pyscript',
                    'previous_device_states'
                  ) or {}
              }
            }}
  
          haeo: >-
            {%- set battery_fresh_entity =
              states.sensor.battery_active_power
            -%}
  
            {%- set ev_fresh_entity =
              states.sensor.ev_akut_active_power
            -%}
  
            {%- set battery_state_raw =
              states(
                'sensor.haeo_battery_power_active'
              )
            -%}
  
            {%- set ev_state_raw =
              states(
                'sensor.haeo_ev_battery_power_active'
              )
            -%}
  
            {%- set battery_state_unit =
              state_attr(
                'sensor.haeo_battery_power_active',
                'unit_of_measurement'
              )
              | default('', true)
              | lower
            -%}
  
            {%- set ev_state_unit =
              state_attr(
                'sensor.haeo_ev_battery_power_active',
                'unit_of_measurement'
              )
              | default('', true)
              | lower
            -%}
  
            {{
              {
                'battery_state_kw': (
                  (battery_state_raw | float) / 1000
                ) if (
                  has_value(
                    'sensor.haeo_battery_power_active'
                  )
                  and battery_state_unit == 'w'
                ) else (
                  states(
                    'sensor.haeo_battery_power_active'
                  ) | float(0)
                ),
  
                'ev_state_kw': (
                  (ev_state_raw | float) / 1000
                ) if (
                  has_value(
                    'sensor.haeo_ev_battery_power_active'
                  )
                  and ev_state_unit == 'w'
                ) else (
                  states(
                    'sensor.haeo_ev_battery_power_active'
                  ) | float(0)
                ),
  
                'battery_age_s': (
                  as_timestamp(now())
                  - as_timestamp(
                      battery_fresh_entity.last_updated,
                      0
                    )
                ) if (
                  battery_fresh_entity is not none
                  and has_value(
                    'sensor.battery_active_power'
                  )
                ) else 999999,
  
                'ev_age_s': (
                  as_timestamp(now())
                  - as_timestamp(
                      ev_fresh_entity.last_updated,
                      0
                    )
                ) if (
                  ev_fresh_entity is not none
                  and has_value(
                    'sensor.ev_akut_active_power'
                  )
                ) else 999999
              }
            }}
  
          policy: >-
            {{
              {
                'haeo_nz_quarter_key':
                  state_attr(
                    'sensor.ems_policy_state_pyscript',
                    'haeo_nz_quarter_key'
                  ) or '',
  
                'haeo_nz_primary_device_id':
                  state_attr(
                    'sensor.ems_policy_state_pyscript',
                    'haeo_nz_primary_device_id'
                  ) or '',
  
                'prev_force_on_device_ids':
                  state_attr(
                    'sensor.ems_policy_state_pyscript',
                    'prev_force_on_device_ids'
                  ) or []
              }
            }}

  
  - sensor:
      - name: PV Instant Power W
        unique_id: pv_instant_power_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {% set v = states('sensor.pv_instant_power_2') %}
          {% if v in ['unknown', 'unavailable', 'none', ''] %}
            {{ none }}
          {% else %}
            {{ (v | float(0) * 1000) | round(0) }}
          {% endif %}

  - sensor:
      - name: "EV Delta (kWh)"
        unit_of_measurement: "kWh"
        state: |-
          {% set wh = states('input_number.ev_delta_wh') | float(0) %}
          {{ (wh / 1000) | round(8) }}



  - sensor:
      - name: "I-PACE Charged Energy Delta"
        unit_of_measurement: "kWh"
        #device_class: energy
        #state_class: measurement 
        state: |-
          {% set delta = states('sensor.ev_delta_kwh') | float(0) %}
          {% if is_state('input_boolean.i_pace_charging', 'on') %}
            {{ delta }}
          {% else %}
            0
          {% endif %}

  - trigger:
      - platform: state
        entity_id: sensor.i_pace_charged_energy_delta
    sensor:
      - name: "I-PACE Cumulative Energy"
        unique_id: i_pace_cumulative_energy
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        state: |-
          {% set old_value = this.state | float(0) %}
          {% set new_delta = trigger.to_state.state | float(0) %}

          {% if new_delta < 0 %}
            {# If the delta is negative (reset/glitch), keep old value #}
            {{ old_value }}
          {% else %}
            {# Otherwise add the new delta to the previous total #}
            {{ (old_value + new_delta) }}
          {% endif %}


  - sensor:
      - name: "Ampera-E Charged Energy Delta"
        unit_of_measurement: "kWh"
        state: |-
          {% set delta = states('sensor.ev_delta_kwh') | float(6) %}
          {% if is_state('input_boolean.i_pace_charging', 'off') %}
            {{ delta }}
          {% else %}
            0
          {% endif %}

  - trigger:
      - platform: state
        entity_id: sensor.ampera_e_charged_energy_delta
    sensor:
      - name: "Ampera-E Cumulative Energy"
        unique_id: ampera_e_cumulative_energy
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        state: |-
          {% set old_value = this.state | float(0) %}
          {% set new_delta = trigger.to_state.state | float(0) %}

          {% if new_delta < 0 %}
            {# Negative means glitch or reset #}
            {{ old_value }}
          {% else %}
            {{ (old_value + new_delta) }}
          {% endif %}



# Add Heater Energy Consumption sensor
  - sensor:
      - name: heater_energy_consumption
        state_class: measurement
        device_class: energy
        unit_of_measurement: "kWh"
        state: |-
          {{
            (states('sensor.heater_on_today')|float(0) * 3)|round(2)
          }}

# EM340 mittarin kahdesta rekisteristä luetut arvot yhdistetään. 
  - sensor:
      - name: energy_active_import
        state_class: total_increasing
        device_class: energy
        unit_of_measurement: "kWh"
        state: |-
          {% set decimal_entity = 'sensor.energy_active_import_desimal' %}
          {% set integer_entity = 'sensor.energy_active_import_integer' %}
          {% set previous_result = states('sensor.energy_active_import') | float(0) %}
          {% set how_old_data_need_for_integer = 15 %}
          {% set integer_state = states(integer_entity) %}
          {% set decimal_state = states(decimal_entity) %}
          {% set integer_updated = states[integer_entity].last_updated %}
          {% set decimal_updated = states[decimal_entity].last_updated %}
          
          {% if integer_state not in ['unknown', 'unavailable', 'None'] and decimal_state not in ['unknown', 'unavailable', 'None'] %}
            {% set integer_value = integer_state | float(0) %}
            {% set decimal_value = decimal_state | float(0) %}
            
            {% if integer_updated is not none and decimal_updated is not none %}
              {% set time_diff = as_timestamp(decimal_updated) - as_timestamp(integer_updated) %}
              {% if time_diff >= how_old_data_need_for_integer %}
                {% set result = (integer_value + decimal_value / 1000) | round(3) %}
              {% else %}
                {% set result = previous_result %}
              {% endif %}
            {% else %}
              {% set result = previous_result %}
            {% endif %}
          {% else %}
            {% set result = previous_result %}
          {% endif %}
          {{ result }}

  - sensor:
      - name: energy_active_export
        state_class: total_increasing
        device_class: energy
        unit_of_measurement: "kWh"
        state: |-
          {% set integer_entity = 'sensor.energy_active_export_integer' %}
          {% set decimal_entity = 'sensor.energy_active_export_desimal' %}
          {% set prev = this.state | float(0) %}
  
          {# Hae State-objektit oikein #}
          {% set int = states[integer_entity] %}
          {% set dec = states[decimal_entity] %}
  
          {% if int is not none and dec is not none
                and int.state not in ['unknown','unavailable','None']
                and dec.state not in ['unknown','unavailable','None']
                and int.last_changed and dec.last_changed %}
            {# Käytä mieluummin last_changed kuin last_updated #}
            {% set time_diff = as_timestamp(dec.last_changed) - as_timestamp(int.last_changed) %}
            {% if time_diff >= 15 %}
              {{ ((int.state | float(0)) + (dec.state | float(0)) / 1000) | round(3) }}
            {% else %}
              {{ prev }}
            {% endif %}
          {% else %}
            {{ prev }}
          {% endif %}
  



          
